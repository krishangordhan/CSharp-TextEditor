name: build and test

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore TextEditor.slnx

      - name: Build
        run: dotnet build TextEditor.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test TextEditor.slnx --no-build --configuration Release --verbosity normal

